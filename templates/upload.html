<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据上传与预览</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        :root {
            --sidebar-w: 240px;
            --primary: #4f6ef7; --primary-dark: #1e3a5f;
            --success: #22c55e; --danger: #ef4444;
            --bg: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); min-height: 100vh; display: flex; }

        /* ========== Sidebar ========== */
        .sidebar {
            width: var(--sidebar-w); min-height: 100vh;
            background: linear-gradient(180deg, #fafbfd 0%, #f6f7fb 40%, #f2f4f8 100%);
            color: #334155; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
            display: flex; flex-direction: column; overflow-y: auto;
            box-shadow:
                1px 0 0 0 rgba(0,0,0,.04),
                4px 0 24px rgba(0,0,0,.05),
                12px 0 48px rgba(0,0,0,.025);
            border-right: 1px solid rgba(0,0,0,.04);
        }
        .sidebar .brand {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(0,0,0,.06);
            background: linear-gradient(180deg, rgba(255,255,255,.7) 0%, transparent 100%);
        }
        .sidebar .brand h4 { margin: 0; font-weight: 700; font-size: 1.05rem; letter-spacing: .5px; color: #0f172a; }
        .sidebar .brand .sub { font-size: .72rem; color: #94a3b8; margin-top: 3px; }
        .sidebar .nav-list { flex: 1; padding: 12px 8px; list-style: none; }
        .sidebar .nav-item { display: block; margin-bottom: 2px; }
        .sidebar .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; margin: 0 8px;
            color: #64748b; border-radius: 10px;
            text-decoration: none; transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: none;
            font-size: .9rem; font-weight: 500;
        }
        .sidebar .nav-link:hover {
            color: #334155;
            background: linear-gradient(135deg, rgba(79,110,247,.06) 0%, rgba(124,92,231,.04) 100%);
        }
        .sidebar .nav-link.active {
            color: var(--primary); font-weight: 600;
            background: linear-gradient(135deg, #ffffff 0%, #fafbff 100%);
            box-shadow:
                0 1px 2px rgba(0,0,0,.04),
                0 4px 16px rgba(79,110,247,.1),
                0 8px 32px rgba(79,110,247,.06);
            border: 1px solid rgba(79,110,247,.08);
        }
        .sidebar .nav-link.done { color: #475569; }
        .sidebar .nav-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: .82rem; font-weight: 700; flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 1px 2px rgba(0,0,0,.04);
            transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar .nav-link.active .nav-icon {
            background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 2px 8px rgba(79,110,247,.25);
        }
        .sidebar .nav-link.done .nav-icon {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            color: #059669;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
        }
        .sidebar .nav-link .check { display: none; }
        .sidebar .nav-link.done .check { display: inline; }

        /* ========== Main ========== */
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 0; width: calc(100% - var(--sidebar-w)); }
        .content-area { max-width: 1000px; margin: 0 auto; padding: 28px 24px 40px; }

        /* ========== Cards ========== */
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 16px; }
        .card-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: 600; font-size: .9rem; }

        /* Drag zone */
        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all .25s; background: #fafbfc; position: relative; }
        .drop-zone:hover { border-color: var(--primary); background: #eef2ff; }
        .drop-zone.dragover { border-color: var(--primary); background: #e0e7ff; box-shadow: 0 0 0 4px rgba(79,110,247,.08); }
        .drop-zone .dz-icon { font-size: 2.8rem; display: block; margin-bottom: 8px; }
        .drop-zone .dz-text { font-weight: 600; color: #334155; }
        .drop-zone .dz-hint { font-size: .82rem; color: #94a3b8; margin-top: 4px; }
        .drop-zone .dz-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .drop-zone.has-file { border-style: solid; border-color: var(--success); background: #f0fdf4; padding: 16px 20px; display: flex; align-items: center; gap: 14px; text-align: left; }
        .drop-zone.has-file .dz-icon { font-size: 1.8rem; margin: 0; }
        .drop-zone .dz-info { flex: 1; min-width: 0; }
        .drop-zone .dz-info .fn { font-weight: 600; font-size: .9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .drop-zone .dz-info .fs { font-size: .78rem; color: #94a3b8; }
        .dz-remove { background: none; border: none; font-size: 1.3rem; color: #94a3b8; cursor: pointer; padding: 4px 10px; border-radius: 6px; line-height: 1; z-index: 2; position: relative; }
        .dz-remove:hover { background: #fee2e2; color: var(--danger); }

        .progress-thin { height: 6px; border-radius: 4px; }
        .progress-thin .progress-bar { background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 4px; }

        .stat-pill { display: inline-block; padding: 6px 14px; border-radius: 20px; background: #f1f5f9; font-size: .82rem; border: 1px solid #e2e8f0; }
        .stat-pill strong { color: var(--primary); }
        .dtype-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: .73rem; font-weight: 500; }
        .dtype-num { background: #dbeafe; color: #1d4ed8; }
        .dtype-cat { background: #fef3c7; color: #b45309; }
        .dtype-text { background: #e2e8f0; color: #475569; }
        .dtype-datetime { background: #d1fae5; color: #059669; }
        .dtype-other { background: #f3e8ff; color: #7c3aed; }

        .preview-wrap { max-height: 380px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
        .preview-wrap table { margin: 0; }
        .preview-wrap thead { position: sticky; top: 0; z-index: 1; }
        .preview-wrap thead th { background: #f8fafc; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }

        .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; }
        .toast-msg { padding: 10px 20px; border-radius: 8px; color: #fff; font-size: .85rem; box-shadow: 0 4px 16px rgba(0,0,0,.18); animation: slideIn .3s ease; margin-bottom: 6px; }
        .toast-success { background: #16a34a; } .toast-error { background: #dc2626; } .toast-info { background: #2563eb; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .nav-row { display: flex; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0; }

        @media (max-width: 768px) {
            .sidebar { width: 56px; }
            .sidebar .brand h4, .sidebar .brand .sub, .sidebar .nav-link span, .sidebar .sidebar-footer { display: none; }
            .sidebar .nav-link { justify-content: center; padding: 14px 0; }
            .sidebar .nav-icon { width: 28px; height: 28px; }
            .main { margin-left: 56px; width: calc(100% - 56px); }
            :root { --sidebar-w: 56px; }
        }
    </style>
</head>

<body>

<!-- ==================== Sidebar ==================== -->
<aside class="sidebar">
    <div class="brand">
        <h4>📊 数据分析</h4>
        <div class="sub">交互式分析系统</div>
    </div>
    <ul class="nav-list">
        <li class="nav-item"><a href="/upload.html" class="nav-link active">
            <span class="nav-icon">1</span><span>数据上传</span>
        </a></li>
        <li class="nav-item"><a href="/clean.html" class="nav-link">
            <span class="nav-icon">2</span><span>数据清洗</span>
        </a></li>
        <li class="nav-item"><a href="/analyze.html" class="nav-link">
            <span class="nav-icon">3</span><span>数据分析</span>
        </a></li>
        <li class="nav-item"><a href="/view.html" class="nav-link">
            <span class="nav-icon">4</span><span>数据可视化</span>
        </a></li>
        <li class="nav-item"><a href="/export" class="nav-link">
            <span class="nav-icon">5</span><span>导出数据</span>
        </a></li>
    </ul>

</aside>

<!-- ==================== Main ==================== -->
<div class="main">
    <div class="content-area">
        <div class="toast-container" id="toastContainer"></div>

        <!-- Upload -->
        <div class="card">
            <div class="card-body">
                <div class="drop-zone" id="dropZone">
                    <input type="file" class="dz-input" id="fileInput" accept=".csv,.xlsx,.xls">
                    <span class="dz-icon" id="dzIcon">📂</span>
                    <div class="dz-info" id="dzFileInfo">
                        <div class="dz-text" id="dzText">拖拽文件到此处，或点击选择文件</div>
                        <div class="dz-hint">支持 CSV / Excel 格式，最大 100MB</div>
                    </div>
                    <button class="dz-remove" id="dzRemove" style="display:none;">×</button>
                </div>
                <div class="d-flex align-items-center gap-3 mt-3">
                    <span id="statusBadge" class="badge bg-secondary">就绪</span>
                    <span id="uploadHint" class="text-muted small"></span>
                </div>
                <div class="progress progress-thin mt-2 d-none" id="progressBar"><div class="progress-bar" id="progressFill" style="width:0%"></div></div>
                <div id="progressText" class="d-none mt-1 small text-muted"></div>
            </div>
        </div>

        <!-- Stats -->
        <div id="statsSection" class="d-none mb-3">
            <div class="d-flex flex-wrap gap-2 mb-3" id="statsBar"></div>
            <div class="card">
                <div class="card-header">列数据类型</div>
                <div class="card-body"><div class="d-flex flex-wrap gap-2" id="dtypeList"></div></div>
            </div>
        </div>

        <!-- Preview -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>数据预览（前 10 行）</span>
                <button class="btn btn-outline-danger btn-sm" onclick="resetUpload()">🔄 重新选择</button>
            </div>
            <div class="card-body p-0"><div class="preview-wrap" id="previewTable"><p class="text-muted m-3">请先上传数据</p></div></div>
        </div>

        <!-- Export -->
        <div class="card">
            <div class="card-body d-flex align-items-center gap-3 flex-wrap">
                <a href="/export" id="exportBtn" class="btn btn-success disabled">📥 导出 CSV</a>
                <span id="exportMsg" class="text-muted small"></span>
            </div>
        </div>

        <!-- Next step -->
        <div class="nav-row">
            <a href="/clean.html" id="btnNextClean" class="btn btn-primary shadow-sm disabled">下一步：数据清洗 →</a>
        </div>
    </div>
</div>

<script>
    var currentColumns=[],currentDtypes={},currentShape=[0,0],currentFilename='';
    function showToast(m,t){var c=document.getElementById('toastContainer'),e=document.createElement('div');e.className='toast-msg toast-'+(t||'info');e.textContent=m;c.appendChild(e);setTimeout(function(){e.remove()},3500)}
    function setBadge(t,c){document.getElementById('statusBadge').textContent=t;document.getElementById('statusBadge').className='badge bg-'+(c||'secondary')}
    (function(){var dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
    dz.addEventListener('click',function(e){if(e.target.classList.contains('dz-remove'))return;fi.click()});
    ['dragenter','dragover'].forEach(function(e){dz.addEventListener(e,function(ev){ev.preventDefault();ev.stopPropagation();if(!dz.classList.contains('has-file'))dz.classList.add('dragover')})});
    ['dragleave','drop'].forEach(function(e){dz.addEventListener(e,function(ev){ev.preventDefault();ev.stopPropagation();dz.classList.remove('dragover')})});
    dz.addEventListener('drop',function(e){var f=e.dataTransfer.files;if(f.length){fi.files=f;onFileSelected(f[0])}});
    fi.addEventListener('change',function(){if(this.files.length)onFileSelected(this.files[0])});
    document.getElementById('dzRemove').addEventListener('click',function(e){e.stopPropagation();clearFileSelection()})})();
    function onFileSelected(f){var ext=f.name.split('.').pop().toLowerCase();if(['csv','xlsx','xls'].indexOf(ext)===-1){showToast('不支持的文件格式','error');clearFileSelection();return}if(f.size>104857600){showToast('文件过大，最大100MB','error');clearFileSelection();return}var dz=document.getElementById('dropZone');dz.classList.add('has-file');document.getElementById('dzIcon').textContent='📄';document.getElementById('dzText').textContent=f.name;var s='',sz=f.size;if(sz<1024)s=sz+' B';else if(sz<1048576)s=(sz/1024).toFixed(1)+' KB';else s=(sz/1048576).toFixed(1)+' MB';var old=document.querySelector('#dzFileInfo .fs');if(old)old.remove();var fe=document.createElement('div');fe.className='fs';fe.textContent=s;document.getElementById('dzFileInfo').appendChild(fe);document.getElementById('dzRemove').style.display='block';document.getElementById('uploadHint').textContent='已选择: '+f.name;uploadFile(f)}
    function clearFileSelection(){document.getElementById('fileInput').value='';var dz=document.getElementById('dropZone');dz.classList.remove('has-file');document.getElementById('dzIcon').textContent='📂';document.getElementById('dzText').textContent='拖拽文件到此处，或点击选择文件';var old=document.querySelector('#dzFileInfo .fs');if(old)old.remove();document.getElementById('dzRemove').style.display='none';document.getElementById('uploadHint').textContent='';document.getElementById('statsSection').classList.add('d-none');document.getElementById('previewTable').innerHTML='<p class="text-muted m-3">请先上传数据</p>';document.getElementById('exportBtn').classList.add('disabled')}
    function uploadFile(f){if(!f)return;setBadge('上传中...','primary');var pb=document.getElementById('progressBar'),pf=document.getElementById('progressFill'),pt=document.getElementById('progressText');pb.classList.remove('d-none');pt.classList.remove('d-none');pf.style.width='0%';pt.textContent='⏳ 上传中... 0%';document.getElementById('uploadHint').textContent='⏳ '+f.name+' 上传中...';var fd=new FormData();fd.append('file',f);var xhr=new XMLHttpRequest();xhr.open('POST','/upload',true);xhr.upload.onprogress=function(e){if(e.lengthComputable){var p=Math.round(e.loaded/e.total*100);pf.style.width=p+'%';pt.textContent='⏳ 上传中... '+p+'%'}};xhr.onload=function(){if(xhr.status===413){showToast('文件过大，最大支持100MB','error');setBadge('就绪','secondary');pb.classList.add('d-none');pt.classList.add('d-none');clearFileSelection();return}try{var j=JSON.parse(xhr.responseText);if(j.code===200){pf.style.width='100%';pt.textContent='✅ 解析完成';setTimeout(function(){pb.classList.add('d-none');pt.classList.add('d-none')},600);onUploadSuccess(j.data)}else{showToast(j.msg||'上传失败','error');setBadge('失败','danger');pb.classList.add('d-none');pt.classList.add('d-none')}}catch(e){showToast('响应解析失败','error');setBadge('失败','danger');pb.classList.add('d-none');pt.classList.add('d-none')}};xhr.onerror=function(){showToast('网络错误','error');setBadge('就绪','secondary');pb.classList.add('d-none');pt.classList.add('d-none')};xhr.send(fd)}
    function onUploadSuccess(d){currentColumns=d.columns||[];currentDtypes=d.dtypes||{};currentShape=d.shape||[0,0];currentFilename=d.filename||'';localStorage.setItem('cols',JSON.stringify(currentColumns));document.getElementById('uploadHint').textContent='✅ 已加载: '+currentFilename;setBadge('已加载','success');document.getElementById('statsSection').classList.remove('d-none');document.getElementById('statsBar').innerHTML='<span class="stat-pill">📄 文件: <strong>'+currentFilename+'</strong></span><span class="stat-pill">行数: <strong>'+currentShape[0]+'</strong></span><span class="stat-pill">列数: <strong>'+currentShape[1]+'</strong></span>';var dc=document.getElementById('dtypeList');dc.innerHTML='';for(var col in currentDtypes){if(!currentDtypes.hasOwnProperty(col))continue;var dt=currentDtypes[col],t=dt.toLowerCase(),cls='dtype-other',icon='❓';if(t.indexOf('int')!==-1||t.indexOf('float')!==-1){cls='dtype-num';icon='🔢'}else if(t.indexOf('object')!==-1||t.indexOf('str')!==-1){cls='dtype-text';icon='📝'}else if(t.indexOf('datetime')!==-1||t.indexOf('date')!==-1){cls='dtype-datetime';icon='📅'}else if(t.indexOf('bool')!==-1){cls='dtype-cat';icon='⚖️'}var s=document.createElement('span');s.innerHTML='<strong>'+col+'</strong> <span class="dtype-badge '+cls+'">'+icon+' '+dt+'</span>';dc.appendChild(s)}renderPreview(d.columns,d.rows);document.getElementById('exportBtn').classList.remove('disabled');document.getElementById('btnNextClean').classList.remove('disabled');document.getElementById('exportMsg').textContent=currentShape[0]+' 行 × '+currentShape[1]+' 列';showToast('✅ 上传成功！'+currentShape[0]+' 行 × '+currentShape[1]+' 列','success')}
    function renderPreview(cols,rows){var w=document.getElementById('previewTable');if(!rows||!rows.length){w.innerHTML='<p class="text-muted m-3">暂无数据</p>';return}var h='<table class="table table-striped table-sm mb-0"><thead><tr>';for(var i=0;i<cols.length;i++)h+='<th>'+cols[i]+'</th>';h+='</tr></thead><tbody>';for(var r=0;r<rows.length;r++){h+='<tr>';for(var c=0;c<rows[r].length;c++){var v=rows[r][c];if(v===null||v===undefined||(typeof v==='number'&&isNaN(v)))v='<span class="text-muted">—</span>';h+='<td>'+v+'</td>'}h+='</tr>'}h+='</tbody></table>';w.innerHTML=h}
    function resetUpload(){currentColumns=[];currentDtypes={};currentShape=[0,0];currentFilename='';clearFileSelection();document.getElementById('statsSection').classList.add('d-none');document.getElementById('exportBtn').classList.add('disabled');document.getElementById('btnNextClean').classList.add('disabled');document.getElementById('exportMsg').textContent='';setBadge('就绪','secondary');showToast('已重置','info')}
</script>
</body>
</html>
