<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理 — 上传与预览</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        :root {
            --primary: #4f6ef7;
            --primary-hover: #3b54d4;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #dee2e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
        }

        .page-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #4f6ef7 100%);
            color: #fff;
            padding: 14px 24px;
            border-radius: 0 0 12px 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .page-header h3 { margin: 0; font-weight: 600; }
        .page-header a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .9rem; }
        .page-header a:hover { color: #fff; }

        /* ========== Drag & Drop Zone ========== */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all .2s ease;
            background: #fafbfc;
            position: relative;
        }
        .drop-zone:hover { border-color: var(--primary); background: #f0f3ff; }
        .drop-zone.dragover {
            border-color: var(--primary); background: #eef2ff;
            box-shadow: 0 0 0 4px rgba(79, 110, 247, .1);
        }
        .drop-zone .dz-icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .drop-zone .dz-text { font-size: 1rem; font-weight: 500; color: #1e293b; }
        .drop-zone .dz-hint { font-size: .85rem; color: #64748b; margin-top: 4px; }
        .drop-zone .dz-file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .drop-zone.has-file {
            border-style: solid; border-color: var(--success); background: #f0fdf4;
            padding: 14px 20px; display: flex; align-items: center; gap: 14px; text-align: left;
        }
        .drop-zone.has-file .dz-icon { font-size: 1.6rem; margin-bottom: 0; }
        .drop-zone .dz-file-info { flex: 1; min-width: 0; }
        .drop-zone .dz-file-info .fn { font-weight: 600; font-size: .9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .drop-zone .dz-file-info .fs { font-size: .8rem; color: #64748b; }
        .dz-remove {
            background: none; border: none; font-size: 1.3rem; color: #64748b;
            cursor: pointer; padding: 4px 10px; border-radius: 6px; line-height: 1;
            z-index: 2; position: relative;
        }
        .dz-remove:hover { background: #fee2e2; color: var(--danger); }

        /* ========== Progress ========== */
        .progress-thin { height: 6px; border-radius: 4px; }
        .progress-thin .progress-bar { background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 4px; transition: width .3s ease; }
        #progressText { font-size: .82rem; color: #64748b; }

        /* ========== Stats ========== */
        .stat-item { display: inline-block; padding: 6px 14px; border-radius: 8px; background: #f1f5f9; border: 1px solid #e2e8f0; font-size: .85rem; }
        .stat-item strong { color: var(--primary); }

        /* ========== Dtype badges ========== */
        .dtype-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: .75rem; font-weight: 500; }
        .dtype-num { background: #dbeafe; color: #1d4ed8; }
        .dtype-cat { background: #fef3c7; color: #b45309; }
        .dtype-text { background: #e2e8f0; color: #475569; }
        .dtype-datetime { background: #d1fae5; color: #059669; }
        .dtype-other { background: #f3e8ff; color: #7c3aed; }

        /* ========== Preview table ========== */
        .preview-wrap { max-height: 380px; overflow: auto; border: 1px solid var(--border); border-radius: 8px; }
        .preview-wrap table { margin-bottom: 0; }
        .preview-wrap thead { position: sticky; top: 0; z-index: 1; }
        .preview-wrap thead th { background: #f1f5f9 !important; border-bottom: 2px solid var(--border) !important; }

        /* ========== Toast ========== */
        .toast-container { position: fixed; top: 16px; right: 16px; z-index: 9999; }
        .toast-msg { padding: 10px 18px; border-radius: 8px; color: #fff; font-size: .875rem; box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: slideIn .3s ease; margin-bottom: 6px; }
        .toast-success { background: #16a34a; }
        .toast-error { background: #dc2626; }
        .toast-info { background: #2563eb; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="page-header">
        <h3>📁 数据上传与预览</h3>
        <a href="/">&larr; 返回首页</a>
    </div>

    <div class="container">

        <!-- Toast -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- ===== 上传区域 ===== -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="drop-zone" id="dropZone">
                    <input type="file" class="dz-file-input" id="fileInput" accept=".csv,.xlsx,.xls">
                    <span class="dz-icon" id="dzIcon">&#x1F4C2;</span>
                    <div class="dz-file-info" id="dzFileInfo">
                        <div class="dz-text" id="dzText">拖拽文件到此处，或点击选择文件</div>
                        <div class="dz-hint">支持 CSV / Excel 格式，最大 100MB</div>
                    </div>
                    <button class="dz-remove" id="dzRemove" style="display:none;" title="移除文件">&times;</button>
                </div>

                <div class="d-flex align-items-center gap-2 mt-3">
                    <span id="statusBadge" class="badge bg-secondary">就绪</span>
                    <span id="uploadHint" class="text-muted small"></span>
                </div>
                <div class="progress progress-thin mt-2 d-none" id="progressBar">
                    <div class="progress-bar" id="progressFill" style="width:0%"></div>
                </div>
                <div id="progressText" class="d-none mt-1"></div>
            </div>
        </div>

        <!-- ===== 统计 + 数据类型 ===== -->
        <div id="statsSection" class="d-none">
            <div class="d-flex flex-wrap gap-2 mb-3" id="statsBar"></div>
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-light fw-semibold">列数据类型</div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2" id="dtypeList"></div>
                </div>
            </div>
        </div>

        <!-- ===== 预览 ===== -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-light fw-semibold d-flex justify-content-between align-items-center">
                <span>数据预览（前10行）</span>
                <button class="btn btn-outline-danger btn-sm" onclick="resetUpload()">&#x1F504; 重新选择</button>
            </div>
            <div class="card-body p-0">
                <div class="preview-wrap" id="previewTable">
                    <p class="text-muted m-3">请先上传数据</p>
                </div>
            </div>
        </div>

        <!-- ===== 导出 ===== -->
        <div class="card shadow-sm">
            <div class="card-body d-flex align-items-center gap-3 flex-wrap">
                <a href="/export" id="exportBtn" class="btn btn-success disabled">
                    &#x1F4E5; 导出 CSV
                </a>
                <span id="exportMsg" class="text-muted small"></span>
            </div>
        </div>

    </div>

    <script>
        // ============ 全局状态 ============
        var currentColumns = [];
        var currentDtypes = {};
        var currentShape = [0, 0];
        var currentFilename = '';

        // ============ Toast ============
        function showToast(msg, type) {
            type = type || 'info';
            var c = document.getElementById('toastContainer');
            var t = document.createElement('div');
            t.className = 'toast-msg toast-' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function() { t.remove(); }, 3500);
        }

        function setBadge(text, cls) {
            cls = cls || 'secondary';
            document.getElementById('statusBadge').textContent = text;
            document.getElementById('statusBadge').className = 'badge bg-' + cls;
        }

        // ============ 拖拽上传 ============
        function setupDropZone() {
            var dz = document.getElementById('dropZone');
            var fi = document.getElementById('fileInput');

            dz.addEventListener('click', function(e) {
                if (e.target.classList.contains('dz-remove')) return;
                fi.click();
            });

            ['dragenter', 'dragover'].forEach(function(evt) {
                dz.addEventListener(evt, function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!dz.classList.contains('has-file')) dz.classList.add('dragover');
                });
            });
            ['dragleave', 'drop'].forEach(function(evt) {
                dz.addEventListener(evt, function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    dz.classList.remove('dragover');
                });
            });

            dz.addEventListener('drop', function(e) {
                var files = e.dataTransfer.files;
                if (files.length > 0) {
                    fi.files = files;
                    onFileSelected(files[0]);
                }
            });

            fi.addEventListener('change', function() {
                if (this.files.length > 0) onFileSelected(this.files[0]);
            });

            document.getElementById('dzRemove').addEventListener('click', function(e) {
                e.stopPropagation();
                clearFileSelection();
            });
        }

        function onFileSelected(file) {
            var ext = file.name.split('.').pop().toLowerCase();
            if (['csv', 'xlsx', 'xls'].indexOf(ext) === -1) {
                showToast('不支持的文件格式，请选择 CSV 或 Excel', 'error');
                clearFileSelection();
                return;
            }
            if (file.size > 100 * 1024 * 1024) {
                showToast('文件过大，最大支持 100MB', 'error');
                clearFileSelection();
                return;
            }

            var dz = document.getElementById('dropZone');
            dz.classList.add('has-file');
            document.getElementById('dzIcon').textContent = '📄';
            document.getElementById('dzText').textContent = file.name;

            var size = file.size;
            var s = '';
            if (size < 1024) s = size + ' B';
            else if (size < 1024 * 1024) s = (size / 1024).toFixed(1) + ' KB';
            else s = (size / (1024 * 1024)).toFixed(1) + ' MB';
            var oldFs = document.querySelector('#dzFileInfo .fs');
            if (oldFs) oldFs.remove();
            var fsEl = document.createElement('div');
            fsEl.className = 'fs';
            fsEl.textContent = s;
            document.getElementById('dzFileInfo').appendChild(fsEl);
            document.getElementById('dzRemove').style.display = 'block';
            document.getElementById('uploadHint').textContent = '已选择: ' + file.name;

            uploadFile(file);
        }

        function clearFileSelection() {
            document.getElementById('fileInput').value = '';
            var dz = document.getElementById('dropZone');
            dz.classList.remove('has-file');
            document.getElementById('dzIcon').textContent = '📂';
            document.getElementById('dzText').textContent = '拖拽文件到此处，或点击选择文件';
            var oldFs = document.querySelector('#dzFileInfo .fs');
            if (oldFs) oldFs.remove();
            document.getElementById('dzRemove').style.display = 'none';
            document.getElementById('uploadHint').textContent = '';
            document.getElementById('statsSection').classList.add('d-none');
            document.getElementById('previewTable').innerHTML = '<p class="text-muted m-3">请先上传数据</p>';
            document.getElementById('exportBtn').classList.add('disabled');
            document.getElementById('exportMsg').textContent = '';
        }

        // ============ 上传（带进度） ============
        function uploadFile(file) {
            if (!file) return;

            setBadge('上传中...', 'primary');
            var pb = document.getElementById('progressBar');
            var pf = document.getElementById('progressFill');
            var pt = document.getElementById('progressText');
            pb.classList.remove('d-none');
            pt.classList.remove('d-none');
            pf.style.width = '0%';
            pt.textContent = '⏳ 上传中... 0%';
            document.getElementById('uploadHint').textContent = '⏳ ' + file.name + ' 上传中...';

            var fd = new FormData();
            fd.append('file', file);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var pct = Math.round((e.loaded / e.total) * 100);
                    pf.style.width = pct + '%';
                    pt.textContent = '⏳ 上传中... ' + pct + '%';
                }
            };

            xhr.onload = function() {
                if (xhr.status === 413) {
                    showToast('文件过大，最大支持 100MB', 'error');
                    setBadge('就绪', 'secondary');
                    pb.classList.add('d-none');
                    pt.classList.add('d-none');
                    clearFileSelection();
                    return;
                }
                try {
                    var json = JSON.parse(xhr.responseText);
                    if (json.code === 200) {
                        pf.style.width = '100%';
                        pt.textContent = '✅ 解析完成';
                        setTimeout(function() {
                            pb.classList.add('d-none');
                            pt.classList.add('d-none');
                        }, 600);
                        onUploadSuccess(json.data);
                    } else {
                        showToast(json.msg || '上传失败', 'error');
                        setBadge('失败', 'danger');
                        pb.classList.add('d-none');
                        pt.classList.add('d-none');
                    }
                } catch(e) {
                    showToast('响应解析失败', 'error');
                    setBadge('失败', 'danger');
                    pb.classList.add('d-none');
                    pt.classList.add('d-none');
                }
            };

            xhr.onerror = function() {
                showToast('网络错误，请检查连接', 'error');
                setBadge('就绪', 'secondary');
                pb.classList.add('d-none');
                pt.classList.add('d-none');
            };

            xhr.send(fd);
        }

        function onUploadSuccess(data) {
            currentColumns = data.columns || [];
            currentDtypes = data.dtypes || {};
            currentShape = data.shape || [0, 0];
            currentFilename = data.filename || '';

            // 保存列名到 localStorage，供可视化/分析页面使用
            localStorage.setItem('cols', JSON.stringify(currentColumns));

            document.getElementById('uploadHint').textContent = '✅ 已加载: ' + currentFilename;
            setBadge('已加载', 'success');

            // 统计
            document.getElementById('statsSection').classList.remove('d-none');
            document.getElementById('statsBar').innerHTML =
                '<span class="stat-item">📄 文件: <strong>' + currentFilename + '</strong></span>' +
                '<span class="stat-item">行数: <strong>' + currentShape[0] + '</strong></span>' +
                '<span class="stat-item">列数: <strong>' + currentShape[1] + '</strong></span>';

            // 数据类型
            var dtContainer = document.getElementById('dtypeList');
            dtContainer.innerHTML = '';
            for (var col in currentDtypes) {
                if (!currentDtypes.hasOwnProperty(col)) continue;
                var dtype = currentDtypes[col];
                var t = dtype.toLowerCase();
                var cls = 'dtype-other';
                var icon = '❓';
                if (t.indexOf('int') !== -1 || t.indexOf('float') !== -1) { cls = 'dtype-num'; icon = '🔢'; }
                else if (t.indexOf('object') !== -1 || t.indexOf('str') !== -1) { cls = 'dtype-text'; icon = '📝'; }
                else if (t.indexOf('datetime') !== -1 || t.indexOf('date') !== -1) { cls = 'dtype-datetime'; icon = '📅'; }
                else if (t.indexOf('bool') !== -1) { cls = 'dtype-cat'; icon = '⚖️'; }
                var span = document.createElement('span');
                span.innerHTML = '<strong>' + col + '</strong> <span class="dtype-badge ' + cls + '">' + icon + ' ' + dtype + '</span>';
                dtContainer.appendChild(span);
            }

            // 预览
            renderPreview(data.columns, data.rows);

            // 启用导出
            document.getElementById('exportBtn').classList.remove('disabled');
            document.getElementById('exportMsg').textContent = currentShape[0] + ' 行 × ' + currentShape[1] + ' 列';

            showToast('✅ 上传成功！' + currentShape[0] + ' 行 × ' + currentShape[1] + ' 列', 'success');
        }

        function renderPreview(columns, rows) {
            var wrapper = document.getElementById('previewTable');
            if (!rows || !rows.length) {
                wrapper.innerHTML = '<p class="text-muted m-3">暂无数据</p>';
                return;
            }
            var html = '<table class="table table-striped table-sm mb-0"><thead><tr>';
            for (var i = 0; i < columns.length; i++) {
                html += '<th>' + columns[i] + '</th>';
            }
            html += '</tr></thead><tbody>';
            for (var r = 0; r < rows.length; r++) {
                html += '<tr>';
                for (var c = 0; c < rows[r].length; c++) {
                    var val = rows[r][c];
                    if (val === null || val === undefined || (typeof val === 'number' && isNaN(val))) {
                        val = '<span class="text-muted">&mdash;</span>';
                    }
                    html += '<td>' + val + '</td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            wrapper.innerHTML = html;
        }

        // ============ 重置 ============
        function resetUpload() {
            currentColumns = [];
            currentDtypes = {};
            currentShape = [0, 0];
            currentFilename = '';
            clearFileSelection();
            document.getElementById('statsSection').classList.add('d-none');
            document.getElementById('exportBtn').classList.add('disabled');
            document.getElementById('exportMsg').textContent = '';
            setBadge('就绪', 'secondary');
            showToast('已重置', 'info');
        }

        // ============ 初始化 ============
        $(document).ready(function() {
            setupDropZone();
        });
    </script>
</body>
</html>
