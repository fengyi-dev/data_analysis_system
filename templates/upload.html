<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        .preview {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>

<body class="container mt-4">
    <h3>数据文件上传与预览、导出</h3>
    <div class="card my-3 p-3">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="form-control">
        <button id="uploadBtn" class="btn btn-primary mt-2">上传文件</button>
        <span id="msg" class="mt-2"></span>
    </div>
    <div class="card p-3">
        <h5>数据预览</h5>
        <div id="tableBox" class="preview">请上传数据</div>
    </div>
    <a href="/export" id="exportBtn" class="btn btn-dark mt-3 disabled">导出Excel/CSV</a>

    <script>
        let tableData = null;
        $('#uploadBtn').click(function () {
            let file = $('#fileInput')[0].files[0];
            if (!file) { $('#msg').html('<span class="text-danger">请选择文件</span>'); return; }
            let fd = new FormData(); fd.append('file', file);
            $.ajax({
                url: '/upload', type: 'POST', data: fd, contentType: false, processData: false,
                success(res) {
                    if (res.code === 200) {
                        $('#msg').html('<span class="text-success">上传成功</span>');
                        tableData = res.data;
                        let html = '<table class="table table-striped"><tr>';
                        res.data.columns.forEach(c => html += `<th>${c}</th>`); html += '</tr>';
                        res.data.rows.forEach(r => { html += '<tr>'; r.forEach(d => html += `<td>${d || ''}</td>`); html += '</tr>' })
                        $('#tableBox').html(html);
                        $('#exportBtn').removeClass('disabled');
                        localStorage.setItem('cols', JSON.stringify(res.data.columns));
                    } else { $('#msg').html(`<span class="text-danger">${res.msg}</span>`) }
                }
            })
        })
    </script>
</body>

</html>
