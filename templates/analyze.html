<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据分析 - 3D聚类 + 回归</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <style>
        .chart-container { height: 450px; width: 100%; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
        @media (max-width: 768px) { .nav-links { justify-content: center; } }
    </style>
</head>

<body class="container mt-4">
    <!-- 顶部导航栏 -->
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
        <h3>📊 数据分析：3D聚类 + 回归预测</h3>
        <div class="nav-links">
            <a href="/upload.html" class="btn btn-outline-primary btn-sm">📁 上传</a>
            <a href="/clean.html" class="btn btn-outline-success btn-sm">🧹 清洗</a>
            <a href="/analyze.html" class="btn btn-primary btn-sm">📈 分析</a>
            <a href="/view.html" class="btn btn-outline-info btn-sm">👁️ 可视化</a>
            <a href="/export" class="btn btn-outline-secondary btn-sm">💾 导出</a>
        </div>
    </div>

    <!-- 参数选择 -->
    <div class="card p-3 mb-3">
        <div class="row align-items-end">
            <div class="col-md-3">
                <label>X 轴字段</label>
                <select id="xCol" class="form-select"></select>
            </div>
            <div class="col-md-3">
                <label>Y 轴字段</label>
                <select id="yCol" class="form-select"></select>
            </div>
            <div class="col-md-3">
                <label>Z 轴字段（聚类）</label>
                <select id="zCol" class="form-select">
                    <option value="">不使用</option>
                </select>
            </div>
            <div class="col-md-2">
                <label>聚类数</label>
                <select id="kValue" class="form-select">
                    <option value="2">2 类</option>
                    <option value="3" selected>3 类</option>
                    <option value="4">4 类</option>
                    <option value="5">5 类</option>
                </select>
            </div>
            <div class="col-md-1">
                <button id="analyzeBtn" class="btn btn-primary w-100">分析</button>
            </div>
        </div>
    </div>

    <!-- 3D 聚类图 -->
    <div class="card mb-3">
        <div class="card-header">🔍 K-Means 3D 聚类（可拖拽旋转）</div>
        <div class="card-body">
            <div id="clusterChart" class="chart-container"></div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-header">📐 线性回归结果</div>
                <div class="card-body" id="regressResult">
                    <p class="text-muted">点击"分析"查看结果</p>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card h-100">
                <div class="card-header">📈 回归线（实际值 vs 预测值）</div>
                <div class="card-body">
                    <div id="regressChart" class="chart-container" style="height: 350px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3 text-center">
        <a href="/clean.html" class="btn btn-outline-secondary">← 返回清洗</a>
        <a href="/view.html" id="nextBtn" class="btn btn-primary ms-2 disabled">下一步：可视化 →</a>
    </div>

    <script>
        let clusterChart = null;
        let regressChart = null;

        $(document).ready(function() {
            clusterChart = echarts.init(document.getElementById('clusterChart'));
            regressChart = echarts.init(document.getElementById('regressChart'));
            loadColumns();
        });

        function loadColumns() {
            let cols = JSON.parse(localStorage.getItem('cols') || '[]');
            let savedX = localStorage.getItem('selectedX') || '';
            let savedY = localStorage.getItem('selectedY') || '';
            cols.forEach(c => {
                let selX = (c === savedX) ? ' selected' : '';
                let selY = (c === savedY) ? ' selected' : '';
                $('#xCol').append(`<option${selX}>${c}</option>`);
                $('#yCol').append(`<option${selY}>${c}</option>`);
                $('#zCol').append(`<option>${c}</option>`);
            });
            if (savedX && savedY) {
                $('#xCol').val(savedX);
                $('#yCol').val(savedY);
            }
        }

        $('#analyzeBtn').click(function() {
            let x = $('#xCol').val();
            let y = $('#yCol').val();
            let z = $('#zCol').val();
            let k = $('#kValue').val();
            if (!x || !y) { alert('请选择 X 和 Y 字段'); return; }

            $('#analyzeBtn').text('分析中...').prop('disabled', true);
            $.ajax({
                url: '/analyze',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ 
                    x_col: x, y_col: y, z_col: z,
                    do_cluster: !!z, 
                    n_clusters: parseInt(k) 
                }),
                success: function(res) {
                    if (res.code === 200) {
                        let data = res.data;
                        if (data.cluster_3d && !data.cluster_3d.error) {
                            draw3DCluster(data.cluster_3d);
                        } else if (data.cluster_3d && data.cluster_3d.error) {
                            $('#clusterChart').parent().parent().find('.card-body').html('<div class="alert alert-warning">' + data.cluster_3d.error + '</div>');
                        }
                        if (data.regression) {
                            displayRegression(data.regression);
                            drawRegressChart(data.regression, x, y);
                            $('#nextBtn').removeClass('disabled');
                        }
                    } else {
                        alert('分析失败：' + res.msg);
                    }
                },
                error: function() { alert('请求失败，请检查后端'); },
                complete: function() { $('#analyzeBtn').text('分析').prop('disabled', false); }
            });
        });

        function draw3DCluster(data) {
            if (clusterChart) clusterChart.resize();
            let colors = ['#5470c6', '#fac858', '#ee6666', '#73c0de', '#3ba272'];
            let points = [];
            for (let i = 0; i < data.data.length; i++) {
                points.push({
                    value: [data.data[i][0], data.data[i][1], data.data[i][2]],
                    label: data.labels[i]
                });
            }
            let seriesData = points.map(p => ({
                value: p.value,
                itemStyle: { color: colors[p.label % colors.length] }
            }));

            let option = {
                title: { text: '3D 聚类结果 (K=' + data.n_clusters + ')' },
                tooltip: { trigger: 'item', formatter: function(params) {
                    return `聚类类别: ${params.data.label + 1}<br>值: [${params.value.join(', ')}]`;
                }},
                xAxis3D: { name: data.features[0] },
                yAxis3D: { name: data.features[1] },
                zAxis3D: { name: data.features[2] },
                grid3D: { viewControl: { autoRotate: false, distance: 200 } },
                series: [{
                    type: 'scatter3D',
                    data: seriesData,
                    symbolSize: 6
                }]
            };
            clusterChart.setOption(option);
        }

        function displayRegression(data) {
            let html = `
                <div class="alert alert-success p-2 text-center">
                    <h5>R² 分数</h5>
                    <h3>${data.r2_score}</h3>
                    <small>越接近1拟合越好</small>
                </div>
                <hr>
                <p><strong>斜率:</strong> ${data.slope}</p>
                <p><strong>截距:</strong> ${data.intercept}</p>
                <p><strong>方程:</strong> y = ${data.slope} x + ${data.intercept}</p>
            `;
            $('#regressResult').html(html);
        }

        function drawRegressChart(regData, xName, yName) {
            $.ajax({
                url: '/get_data',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ x_col: xName, y_col: yName }),
                success: function(res) {
                    if (res.code === 200) {
                        let xData = res.data.x_values;
                        let yData = res.data.y_values;
                        regressChart.setOption({
                            title: { text: '回归效果' },
                            tooltip: { trigger: 'axis' },
                            xAxis: { name: xName },
                            yAxis: { name: yName },
                            series: [
                                { name: '实际值', type: 'scatter', data: xData.map((x, i) => [x, yData[i]]), itemStyle: { color: '#5470c6' } },
                                { name: '回归线', type: 'line', data: xData.map((x, i) => [x, regData.predictions[i]]), lineStyle: { color: '#ee6666', width: 2 } }
                            ]
                        });
                    }
                }
            });
        }
    </script>
</body>

</html>
