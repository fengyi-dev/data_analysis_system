<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析 — 线性回归</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        :root { --sidebar-w: 240px; --primary: #4f6ef7; --primary-dark: #1e3a5f; --success: #22c55e; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); min-height: 100vh; display: flex; }

        .sidebar { width: var(--sidebar-w); min-height: 100vh; background: linear-gradient(180deg, #fafbfd 0%, #f6f7fb 40%, #f2f4f8 100%); color: #334155; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 1px 0 0 0 rgba(0,0,0,.04), 4px 0 24px rgba(0,0,0,.05), 12px 0 48px rgba(0,0,0,.025); border-right: 1px solid rgba(0,0,0,.04); }
        .sidebar .brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(0,0,0,.06); background: linear-gradient(180deg, rgba(255,255,255,.7) 0%, transparent 100%); }
        .sidebar .brand h4 { margin: 0; font-weight: 700; font-size: 1.05rem; color: #0f172a; }
        .sidebar .brand .sub { font-size: .72rem; color: #94a3b8; margin-top: 3px; }
        .sidebar .nav-list { flex: 1; padding: 12px 8px; list-style: none; }
        .sidebar .nav-item { display: block; margin-bottom: 2px; }
        .sidebar .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin: 0 8px; color: #64748b; border-radius: 10px; text-decoration: none; transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); border-left: none; font-size: .9rem; font-weight: 500; }
        .sidebar .nav-link:hover { color: #334155; background: linear-gradient(135deg, rgba(79,110,247,.06) 0%, rgba(124,92,231,.04) 100%); }
        .sidebar .nav-link.active { color: var(--primary); font-weight: 600; background: linear-gradient(135deg, #ffffff 0%, #fafbff 100%); box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(79,110,247,.1), 0 8px 32px rgba(79,110,247,.06); border: 1px solid rgba(79,110,247,.08); }
        .sidebar .nav-link.done { color: #475569; }
        .sidebar .nav-icon { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); display: flex; align-items: center; justify-content: center; font-size: .82rem; font-weight: 700; flex-shrink: 0; box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 1px 2px rgba(0,0,0,.04); transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar .nav-link.active .nav-icon { background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%); color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 2px 8px rgba(79,110,247,.25); }
        .sidebar .nav-link.done .nav-icon { background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); color: #059669; box-shadow: inset 0 1px 0 rgba(255,255,255,.6); }

        .main { margin-left: var(--sidebar-w); flex: 1; width: calc(100% - var(--sidebar-w)); }
        .content-area { max-width: 1000px; margin: 0 auto; padding: 28px 24px 40px; }

        .card { border: none; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 16px; }
        .section-hidden { display: none !important; }
        .metric-card { background: linear-gradient(135deg, #f8f9ff 0%, #eef1ff 100%); border-radius: 12px; padding: 24px 16px; text-align: center; border: 1px solid #e0e4ff; }
        .metric-card .metric-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .metric-card .metric-label { font-size: .78rem; color: #94a3b8; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
        .formula-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px 20px; color: #92400e; font-weight: 600; font-size: .95rem; text-align: center; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0; }

        @media (max-width: 768px) {
            .sidebar { width: 56px; }
            .sidebar .brand h4, .sidebar .brand .sub, .sidebar .nav-link span, .sidebar .sidebar-footer { display: none; }
            .sidebar .nav-link { justify-content: center; padding: 14px 0; }
            .sidebar .nav-icon { width: 28px; height: 28px; }
            .main { margin-left: 56px; width: calc(100% - 56px); }
            :root { --sidebar-w: 56px; }
        }
    </style>
</head>

<body>

<aside class="sidebar">
    <div class="brand"><h4>📊 数据分析</h4><div class="sub">交互式分析系统</div></div>
    <ul class="nav-list">
        <li class="nav-item"><a href="/upload.html" class="nav-link done"><span class="nav-icon">✓</span><span>数据上传</span></a></li>
        <li class="nav-item"><a href="/clean.html" class="nav-link done"><span class="nav-icon">✓</span><span>数据清洗</span></a></li>
        <li class="nav-item"><a href="/analyze.html" class="nav-link active"><span class="nav-icon">3</span><span>数据分析</span></a></li>
        <li class="nav-item"><a href="/view.html" class="nav-link"><span class="nav-icon">4</span><span>数据可视化</span></a></li>
        <li class="nav-item"><a href="/export" class="nav-link"><span class="nav-icon">5</span><span>导出数据</span></a></li>
    </ul>

</aside>

<div class="main">
<div class="content-area">

    <!-- 选列 -->
    <div class="card">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small text-secondary">X 自变量（特征列）</label>
                    <select id="ax" class="form-select"></select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small text-secondary">Y 因变量（目标列）</label>
                    <select id="ay" class="form-select"></select>
                </div>
                <div class="col-md-4">
                    <button id="anaBtn" class="btn btn-warning fw-semibold w-100">🔍 开始分析</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 结果 -->
    <div class="section-hidden" id="resultRow">
        <div class="row g-3 mb-3">
            <div class="col-md-3">
                <div class="metric-card"><div class="metric-value" id="r2">—</div><div class="metric-label">R² 决定系数</div></div>
            </div>
            <div class="col-md-3">
                <div class="metric-card"><div class="metric-value" id="slope">—</div><div class="metric-label">斜率 Slope</div></div>
            </div>
            <div class="col-md-3">
                <div class="metric-card"><div class="metric-value" id="inter">—</div><div class="metric-label">截距 Intercept</div></div>
            </div>
            <div class="col-md-3">
                <div class="metric-card"><div class="metric-value" id="nSamples">—</div><div class="metric-label">样本数量</div></div>
            </div>
        </div>
        <div class="formula-box" id="formulaText"></div>
    </div>

    <div class="nav-row">
        <a href="/clean.html" class="btn btn-outline-secondary">← 返回清洗</a>
        <a href="/view.html" id="btnNextView" class="btn btn-primary shadow-sm disabled">下一步：数据可视化 →</a>
    </div>

</div>
</div>

<script>
    var cols=JSON.parse(localStorage.getItem('cols')||'[]'),sx=localStorage.getItem('selectedX')||'',sy=localStorage.getItem('selectedY')||'';
    cols.forEach(function(c){var x=c===sx?' selected':'';var y=c===sy?' selected':'';$('#ax').append('<option'+x+'>'+c+'</option>');$('#ay').append('<option'+y+'>'+c+'</option>')});
    if(sx&&sy){$('#ax').val(sx);$('#ay').val(sy)}
    function showErr(m){$('#anaErr').remove();$('#anaBtn').after('<div class="alert alert-warning mt-2 py-1 small" id="anaErr">'+m+'</div>');setTimeout(function(){$('#anaErr').remove()},5000)}
    $('#anaBtn').click(function(){var x=$('#ax').val(),y=$('#ay').val();if(!x||!y){alert('请选择字段');return}localStorage.setItem('selectedX',x);localStorage.setItem('selectedY',y);$('#anaErr').remove();$.ajax({url:'/analyze',type:'POST',contentType:'application/json',data:JSON.stringify({x_col:x,y_col:y}),success:function(r){if(r.code!==200){showErr('⚠ '+(r.msg||'分析失败'));return}$('#r2').text(r.data.r2_score);$('#slope').text(r.data.slope);$('#inter').text(r.data.intercept);$('#nSamples').text(r.data.predictions.length);var s=r.data.intercept>=0?'+':'';$('#formulaText').html('📐 回归方程：<strong>Y = '+r.data.slope+' × X '+s+' '+r.data.intercept+'</strong>  |  R² = '+r.data.r2_score+'  |  样本数 = '+r.data.predictions.length);$('#resultRow').removeClass('section-hidden');$('#btnNextView').removeClass('disabled')},error:function(x){try{var e=JSON.parse(x.responseText);showErr('⚠ '+(e.msg||'请求失败'))}catch(c){showErr('⚠ 请求失败，请确认已上传数据')}}})});
    if(sx&&sy)setTimeout(function(){$('#anaBtn').click()},300)
</script>
</body>
</html>
