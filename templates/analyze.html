<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据分析-线性回归</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
</head>

<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>线性回归分析（R²、斜率、截距）</h3>
        <div class="d-flex gap-2">
            <a href="/view.html" class="btn btn-outline-info btn-sm">📈 跳转可视化</a>
            <a href="/" class="btn btn-outline-secondary btn-sm">&larr; 返回首页</a>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-4">
            <label>X自变量</label>
            <select id="ax" class="form-select"></select>
        </div>
        <div class="col-md-4">
            <label>Y因变量</label>
            <select id="ay" class="form-select"></select>
        </div>
        <div class="col-md-4 mt-4">
            <button id="anaBtn" class="btn btn-warning">开始分析</button>
        </div>
    </div>
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>R²系数</h5>
                <p id="r2"></p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>斜率</h5>
                <p id="slope"></p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>截距</h5>
                <p id="inter"></p>
            </div>
        </div>
    </div>

    <script>
        //填充下拉
        let cols = JSON.parse(localStorage.getItem('cols') || '[]');
        let savedX = localStorage.getItem('selectedX') || '';
        let savedY = localStorage.getItem('selectedY') || '';
        cols.forEach(c => {
            let selX = (c === savedX) ? ' selected' : '';
            let selY = (c === savedY) ? ' selected' : '';
            $('#ax').append(`<option${selX}>${c}</option>`);
            $('#ay').append(`<option${selY}>${c}</option>`);
        })
        // 如果有保存的字段，自动触发分析
        if (savedX && savedY) {
            $('#ax').val(savedX);
            $('#ay').val(savedY);
        }
        //分析请求
        $('#anaBtn').click(function () {
            let x = $('#ax').val(), y = $('#ay').val();
            // 同步保存选中字段
            localStorage.setItem('selectedX', x);
            localStorage.setItem('selectedY', y);
            $.ajax({
                url: '/analyze', type: 'POST', contentType: 'application/json',
                data: JSON.stringify({ x_col: x, y_col: y }),
                success(res) {
                    $('#r2').text(res.data.r2_score);
                    $('#slope').text(res.data.slope);
                    $('#inter').text(res.data.intercept);
                }
            })
        })
        // 如果有预设字段，自动分析一次
        if (savedX && savedY) {
            setTimeout(function() { $('#anaBtn').click(); }, 300);
        }
    </script>
</body>

</html>
