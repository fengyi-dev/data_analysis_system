<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据清洗</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        :root { --sidebar-w: 240px; --primary: #4f6ef7; --primary-dark: #1e3a5f; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); min-height: 100vh; display: flex; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-w); min-height: 100vh; background: linear-gradient(180deg, #fafbfd 0%, #f6f7fb 40%, #f2f4f8 100%); color: #334155; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 1px 0 0 0 rgba(0,0,0,.04), 4px 0 24px rgba(0,0,0,.05), 12px 0 48px rgba(0,0,0,.025); border-right: 1px solid rgba(0,0,0,.04); }
        .sidebar .brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(0,0,0,.06); background: linear-gradient(180deg, rgba(255,255,255,.7) 0%, transparent 100%); }
        .sidebar .brand h4 { margin: 0; font-weight: 700; font-size: 1.05rem; color: #0f172a; }
        .sidebar .brand .sub { font-size: .72rem; color: #94a3b8; margin-top: 3px; }
        .sidebar .nav-list { flex: 1; padding: 12px 8px; list-style: none; }
        .sidebar .nav-item { display: block; margin-bottom: 2px; }
        .sidebar .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin: 0 8px; color: #64748b; border-radius: 10px; text-decoration: none; transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); border-left: none; font-size: .9rem; font-weight: 500; }
        .sidebar .nav-link:hover { color: #334155; background: linear-gradient(135deg, rgba(79,110,247,.06) 0%, rgba(124,92,231,.04) 100%); }
        .sidebar .nav-link.active { color: var(--primary); font-weight: 600; background: linear-gradient(135deg, #ffffff 0%, #fafbff 100%); box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(79,110,247,.1), 0 8px 32px rgba(79,110,247,.06); border: 1px solid rgba(79,110,247,.08); }
        .sidebar .nav-link.done { color: #475569; }
        .sidebar .nav-icon { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); display: flex; align-items: center; justify-content: center; font-size: .82rem; font-weight: 700; flex-shrink: 0; box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 1px 2px rgba(0,0,0,.04); transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar .nav-link.active .nav-icon { background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%); color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 2px 8px rgba(79,110,247,.25); }
        .sidebar .nav-link.done .nav-icon { background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); color: #059669; box-shadow: inset 0 1px 0 rgba(255,255,255,.6); }

        /* Main */
        .main { margin-left: var(--sidebar-w); flex: 1; width: calc(100% - var(--sidebar-w)); }
        .content-area { max-width: 1000px; margin: 0 auto; padding: 28px 24px 40px; }

        .card { border: none; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 16px; }
        .card-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: 600; font-size: .9rem; }
        .section-hidden { display: none !important; }
        .badge-click { cursor: pointer; text-decoration: underline; }
        .table-wrap { max-height: 380px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
        .table-wrap thead th { position: sticky; top: 0; background: #f8fafc; z-index: 1; white-space: nowrap; }
        .config-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid #f1f5f9; transition: background .15s; flex-wrap: wrap; font-size: 13px; }
        .config-row:hover { background: #f8fafc; }
        .config-row .col-label { min-width: 130px; font-weight: 600; font-size: 12px; color: #475569; }
        .config-row select { padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; }
        .badge-pill { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-pill.danger { background: #fee2e2; color: #991b1b; }
        .badge-pill.warn { background: #fef3c7; color: #92400e; }
        .outlier-card { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 14px 18px; margin-top: 12px; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0; }

        @media (max-width: 768px) {
            .sidebar { width: 56px; }
            .sidebar .brand h4, .sidebar .brand .sub, .sidebar .nav-link span, .sidebar .sidebar-footer { display: none; }
            .sidebar .nav-link { justify-content: center; padding: 14px 0; }
            .sidebar .nav-icon { width: 28px; height: 28px; }
            .main { margin-left: 56px; width: calc(100% - 56px); }
            :root { --sidebar-w: 56px; }
        }
    </style>
</head>

<body>

<aside class="sidebar">
    <div class="brand"><h4>📊 数据分析</h4><div class="sub">交互式分析系统</div></div>
    <ul class="nav-list">
        <li class="nav-item"><a href="/upload.html" class="nav-link done"><span class="nav-icon">✓</span><span>数据上传</span></a></li>
        <li class="nav-item"><a href="/clean.html" class="nav-link active"><span class="nav-icon">2</span><span>数据清洗</span></a></li>
        <li class="nav-item"><a href="/analyze.html" class="nav-link"><span class="nav-icon">3</span><span>数据分析</span></a></li>
        <li class="nav-item"><a href="/view.html" class="nav-link"><span class="nav-icon">4</span><span>数据可视化</span></a></li>
        <li class="nav-item"><a href="/export" class="nav-link"><span class="nav-icon">5</span><span>导出数据</span></a></li>
    </ul>

</aside>

<div class="main">
<div class="content-area">

    <!-- 手动清洗 -->
    <div class="card">
        <div class="card-header">手动清洗：缺失值处理</div>
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-auto">
                    <select id="cleanType" class="form-select" style="width:160px;">
                        <option value="drop">删除缺失行</option>
                        <option value="mean">均值填充</option>
                        <option value="median">中位数填充</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button id="cleanBtn" class="btn btn-success btn-sm">执行清洗</button>
                </div>
            </div>
            <div id="cleanTip" class="mt-2"></div>
        </div>
    </div>

    <!-- 自动清洗 -->
    <div class="card">
        <div class="card-header">自动清洗：质量检测 + 规则配置</div>
        <div class="card-body">
            <p class="text-muted small mb-3">检测每列的缺失值、异常值（IQR 方法），逐列自定义策略后一键执行。</p>
            <button id="btnQualityCheck" class="btn btn-primary">🔍 检测数据质量</button>
            <div id="qualityTip" class="mt-2"></div>
        </div>
    </div>

    <!-- 质量报告 -->
    <div class="card section-hidden" id="qualityReportCard">
        <div class="card-header">数据质量报告 <span class="text-muted fw-normal small" id="qualitySummary"></span></div>
        <div class="card-body p-0">
            <div class="table-wrap">
                <table class="table table-sm mb-0">
                    <thead><tr><th>列名</th><th>类型</th><th>缺失值</th><th>异常值</th><th>正常范围 (IQR)</th></tr></thead>
                    <tbody id="qualityTableBody"></tbody>
                </table>
            </div>
            <div id="outlierDetailCard" class="outlier-card section-hidden">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong id="outlierDetailTitle" class="small"></strong>
                    <button class="btn-close btn-sm" onclick="$('#outlierDetailCard').addClass('section-hidden')"></button>
                </div>
                <div class="table-wrap" style="max-height:220px;">
                    <table class="table table-sm mb-0"><thead id="outlierDetailHead"></thead><tbody id="outlierDetailBody"></tbody></table>
                </div>
            </div>
        </div>
        <div class="card-footer bg-white">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <h6 class="mb-0">清洗规则配置</h6>
                <div>
                    <button id="btnAutoClean" class="btn btn-success btn-sm">✅ 执行自动清洗</button>
                    <button id="btnResetConfig" class="btn btn-outline-secondary btn-sm">🔄 重置</button>
                </div>
            </div>
            <div id="cleanConfigGrid"></div>
            <div id="autoCleanTip" class="mt-2"></div>
        </div>
    </div>

    <!-- 预览 -->
    <div class="card section-hidden" id="previewCard">
        <div class="card-header">清洗后数据预览</div>
        <div class="card-body p-0">
            <div class="table-wrap">
                <table class="table table-sm mb-0"><thead id="previewHead"></thead><tbody id="previewBody"></tbody></table>
            </div>
        </div>
    </div>

    <div class="nav-row">
        <a href="/upload.html" class="btn btn-outline-secondary">← 返回上传</a>
        <a href="/analyze.html" id="btnNextAnalyze" class="btn btn-primary shadow-sm disabled">下一步：数据分析 →</a>
    </div>

</div>
</div>

<script>
    var qualityReportCache=null;
    $('#cleanBtn').click(function(){var t=$('#cleanType').val();$.ajax({url:'/clean',type:'POST',contentType:'application/json',data:JSON.stringify({method:t}),success:function(r){if(r.code!==200){$('#cleanTip').html('<span class="text-warning">⚠ '+(r.msg||'清洗失败')+'</span>');return}$('#cleanTip').html('<span class="text-success">✅ 清洗完成 — '+r.data.shape[0]+' 行 × '+r.data.shape[1]+' 列</span>');renderPreview(r.data);$('#btnNextAnalyze').removeClass('disabled')},error:function(x){try{var e=JSON.parse(x.responseText);$('#cleanTip').html('<span class="text-warning">⚠ '+(e.msg||'请求失败')+'</span>')}catch(c){$('#cleanTip').html('<span class="text-warning">⚠ 请求失败</span>')}}})});

    $('#btnQualityCheck').click(function(){$('#qualityTip').html('<span class="text-info">⏳ 检测中...</span>');$.ajax({url:'/data_quality',type:'GET',success:function(r){if(r.code!==200){$('#qualityTip').html('<span class="text-warning">⚠ '+(r.msg||'检测失败')+'</span>');return}qualityReportCache=r.data;renderQualityReport(r.data);renderCleanConfig(r.data);$('#qualityReportCard').removeClass('section-hidden');$('#qualityTip').html('<span class="text-success">✅ 检测完成</span>')},error:function(x){try{var e=JSON.parse(x.responseText);$('#qualityTip').html('<span class="text-danger">❌ '+(e.msg||'检测失败')+'</span>')}catch(c){$('#qualityTip').html('<span class="text-danger">❌ 检测失败</span>')}}})});

    function renderQualityReport(r){var tm=r.columns.filter(function(c){return c.missing_count>0}).length,to=r.columns.filter(function(c){return c.outlier_count>0}).length;$('#qualitySummary').text('共 '+r.total_rows+' 行 × '+r.total_cols+' 列 | 缺失列：'+tm+' | 异常列：'+to);var rows='';r.columns.forEach(function(c){var mb=c.missing_count>0?'<span class="badge bg-danger">'+c.missing_count+' ('+c.missing_pct+'%)</span>':'<span class="badge bg-success">0</span>';var ob=c.outlier_count>0?'<span class="badge bg-warning text-dark badge-click" onclick="showOutlierRows(\''+c.name+'\')">'+c.outlier_count+' ('+c.outlier_pct+'%)</span>':'<span class="badge bg-success">0</span>';if(!c.outlier_method)ob='<span class="badge bg-secondary">—</span>';var bd=c.outlier_bounds&&c.outlier_bounds.length===2?'['+c.outlier_bounds[0].toFixed(2)+', '+c.outlier_bounds[1].toFixed(2)+']':'—';rows+='<tr><td><strong>'+c.name+'</strong></td><td>'+c.dtype+'</td><td>'+mb+'</td><td>'+ob+'</td><td>'+bd+'</td></tr>'});$('#qualityTableBody').html(rows)}

    function showOutlierRows(cn){if(!qualityReportCache)return;var c=qualityReportCache.columns.find(function(x){return x.name===cn});if(!c||!c.outlier_rows||!c.outlier_rows.length)return;var bs=c.outlier_bounds&&c.outlier_bounds.length===2?c.outlier_bounds[0].toFixed(2)+', '+c.outlier_bounds[1].toFixed(2):'';$('#outlierDetailTitle').text('列 ['+cn+'] 异常值 (共 '+c.outlier_rows.length+' 行, 正常范围 ['+bs+'])');var ac=qualityReportCache.columns.map(function(x){return x.name});$('#outlierDetailHead').html('<tr><th>行号</th>'+ac.map(function(x){var s=x===cn?' style="background:#fff3cd;color:#92400e;"':'';return'<th'+s+'>'+x+'</th>'}).join('')+'</tr>');$('#outlierDetailBody').html(c.outlier_rows.map(function(r){return'<tr><td><strong>'+r.index+'</strong></td>'+ac.map(function(x){var s=x===cn?' style="background:#fff3cd;font-weight:600;"':'';var v=r.values[x];return'<td'+s+'>'+(v!=null?v:'')+'</td>'}).join('')+'</tr>'}).join(''));$('#outlierDetailCard').removeClass('section-hidden');$('#outlierDetailCard')[0].scrollIntoView({behavior:'smooth',block:'nearest'})}

    function renderCleanConfig(r){var h='';r.columns.forEach(function(c){var mo='';['ignore','fill_mean','fill_median','fill_mode','fill_zero','fill_ffill','fill_bfill','drop'].forEach(function(s){var lb={ignore:'不处理',fill_mean:'填均值',fill_median:'填中位数',fill_mode:'填众数',fill_zero:'填0',fill_ffill:'前向填充',fill_bfill:'后向填充',drop:'删行'};var se=(c.missing_count>0&&s==='fill_mean')||(c.missing_count===0&&s==='ignore')?' selected':'';mo+='<option value="'+s+'"'+se+'>'+lb[s]+'</option>'});var oo='';if(c.outlier_method){['ignore','cap','remove'].forEach(function(s){var lb={ignore:'不处理',cap:'截断替换',remove:'删行'};var se=s==='cap'?' selected':'';oo+='<option value="'+s+'"'+se+'>'+lb[s]+'</option>'})}else{oo='<option value="ignore" selected>—</option>'}var bg='';if(c.missing_count>0)bg+='<span class="badge-pill danger">缺'+c.missing_count+'</span>';if(c.outlier_count>0)bg+='<span class="badge-pill warn">异'+c.outlier_count+'</span>';h+='<div class="config-row"><span class="col-label">'+c.name+'</span><label class="small mb-0">缺失:</label><select class="sel-miss" data-col="'+c.name+'" style="width:110px;">'+mo+'</select><label class="small mb-0">异常:</label><select class="sel-outlier" data-col="'+c.name+'" style="width:110px;">'+oo+'</select>'+bg+'</div>'});$('#cleanConfigGrid').html(h)}

    $('#btnAutoClean').click(function(){var mc={},oc={method:'iqr',iqr_multiplier:1.5};$('.sel-miss').each(function(){mc[$(this).data('col')]=$(this).val()});$('.sel-outlier').each(function(){oc[$(this).data('col')]=$(this).val()});$('#autoCleanTip').html('<span class="text-info">⏳ 清洗中...</span>');$.ajax({url:'/auto_clean',type:'POST',contentType:'application/json',data:JSON.stringify({missing_strategy:mc,outlier_strategy:oc}),success:function(r){if(r.code!==200){$('#autoCleanTip').html('<span class="text-warning">⚠ '+(r.msg||'清洗失败')+'</span>');return}var d=r.data.report.details?r.data.report.details.replace(/\n/g,'<br>'):'';$('#autoCleanTip').html('<span class="text-success">✅ '+r.msg+'</span><br><small class="text-muted">'+d+'</small>');renderPreview(r.data);$('#btnNextAnalyze').removeClass('disabled');$('#btnQualityCheck').click()},error:function(x){try{var e=JSON.parse(x.responseText);$('#autoCleanTip').html('<span class="text-warning">⚠ '+(e.msg||'清洗失败')+'</span>')}catch(c){$('#autoCleanTip').html('<span class="text-warning">⚠ 清洗失败</span>')}}})});
    $('#btnResetConfig').click(function(){$('#btnQualityCheck').click()});

    function renderPreview(d){localStorage.setItem('cols',JSON.stringify(d.columns));$('#previewHead').html('<tr>'+d.columns.map(function(c){return'<th>'+c+'</th>'}).join('')+'</tr>');$('#previewBody').html(d.rows.map(function(r){return'<tr>'+r.map(function(v){return'<td>'+(v!=null?v:'')+'</td>'}).join('')+'</tr>'}).join(''));$('#previewCard').removeClass('section-hidden')}
</script>
</body>
</html>
