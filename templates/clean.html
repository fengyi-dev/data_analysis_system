<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据清洗</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        .badge-click { cursor: pointer; text-decoration: underline; }
        .config-row { font-size: 13px; }
        .config-row select.form-select-sm { width: auto; display: inline; }
        .table-wrapper { max-height: 400px; overflow: auto; }
        .table-wrapper thead th { position: sticky; top: 0; background: #f8f9fa; z-index: 1; }
        .section-hidden { display: none; }
    </style>
</head>

<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>数据清洗</h3>
        <a href="/" class="btn btn-outline-secondary btn-sm">&larr; 返回首页</a>
    </div>

    <!-- ====== 手动清洗（保留原有功能） ====== -->
    <div class="card p-3 mb-3">
        <h5>手动清洗：缺失值处理</h5>
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <select id="cleanType" class="form-select">
                    <option value="drop">删除缺失行</option>
                    <option value="mean">均值填充</option>
                    <option value="median">中位数填充</option>
                </select>
            </div>
            <div class="col-auto">
                <button id="cleanBtn" class="btn btn-success">执行清洗</button>
            </div>
        </div>
        <div id="cleanTip" class="mt-2"></div>
    </div>

    <!-- ====== 自动清洗：数据质量检测 ====== -->
    <div class="card p-3 mb-3">
        <h5>自动清洗：质量检测 + 规则配置</h5>
        <p class="text-muted small mb-2">检测每列的缺失值、异常值（IQR方法），逐列配置清洗策略后一键执行。</p>
        <button id="btnQualityCheck" class="btn btn-primary">🔍 检测数据质量</button>
        <div id="qualityTip" class="mt-2"></div>
    </div>

    <!-- ====== 质量报告区域 ====== -->
    <div class="card p-3 mb-3 section-hidden" id="qualityReportCard">
        <h6>数据质量报告 <span class="text-muted fw-normal" id="qualitySummary"></span></h6>
        <div class="table-wrapper">
            <table class="table table-sm table-bordered">
                <thead>
                    <tr>
                        <th>列名</th><th>类型</th>
                        <th>缺失值</th><th>异常值</th><th>正常范围 (IQR)</th>
                    </tr>
                </thead>
                <tbody id="qualityTableBody"></tbody>
            </table>
        </div>

        <!-- 异常值详情 -->
        <div id="outlierDetailCard" class="section-hidden mt-2 p-3 bg-warning bg-opacity-10 border border-warning rounded">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <strong id="outlierDetailTitle">异常值详情</strong>
                <button class="btn-close" onclick="$('#outlierDetailCard').addClass('section-hidden')"></button>
            </div>
            <div class="table-wrapper" style="max-height:250px;">
                <table class="table table-sm table-bordered mb-0">
                    <thead id="outlierDetailHead"></thead>
                    <tbody id="outlierDetailBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 每列清洗策略配置 -->
        <h6 class="mt-3">清洗规则配置</h6>
        <div id="cleanConfigGrid" class="mb-3"></div>
        <div>
            <button id="btnAutoClean" class="btn btn-success">✅ 执行自动清洗</button>
            <button id="btnResetConfig" class="btn btn-outline-secondary">🔄 重置配置</button>
        </div>
        <div id="autoCleanTip" class="mt-2"></div>
    </div>

    <!-- ====== 清洗后数据预览 ====== -->
    <div class="card p-3 section-hidden" id="previewCard">
        <h5>数据预览</h5>
        <div class="table-wrapper">
            <table class="table table-sm table-bordered mb-0">
                <thead id="previewHead"></thead>
                <tbody id="previewBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        var qualityReportCache = null;

        // ========== 手动清洗（原有） ==========
        $('#cleanBtn').click(function () {
            var type = $('#cleanType').val();
            $.ajax({
                url: '/clean', type: 'POST', contentType: 'application/json',
                data: JSON.stringify({ method: type }),
                success: function (res) {
                    if (res.code !== 200) {
                        $('#cleanTip').html('<span class="text-warning">⚠ ' + (res.msg || '清洗失败') + '</span>');
                        return;
                    }
                    $('#cleanTip').html('<span class="text-success">✅ 清洗完成 — ' + res.data.shape[0] + ' 行 × ' + res.data.shape[1] + ' 列</span>');
                    renderPreview(res.data);
                },
                error: function (xhr) {
                    try { var err = JSON.parse(xhr.responseText); $('#cleanTip').html('<span class="text-warning">⚠ ' + (err.msg || '请求失败') + '</span>'); }
                    catch (e) { $('#cleanTip').html('<span class="text-warning">⚠ 请求失败，请确认已上传数据后刷新页面</span>'); }
                }
            });
        });

        // ========== 数据质量检测 ==========
        $('#btnQualityCheck').click(function () {
            $('#qualityTip').html('<span class="text-info">⏳ 检测中...</span>');
            $.ajax({
                url: '/data_quality', type: 'GET',
                success: function (res) {
                    if (res.code !== 200) {
                        $('#qualityTip').html('<span class="text-warning">⚠ ' + (res.msg || '检测失败') + '</span>');
                        return;
                    }
                    qualityReportCache = res.data;
                    renderQualityReport(res.data);
                    renderCleanConfig(res.data);
                    $('#qualityReportCard').removeClass('section-hidden');
                    $('#qualityTip').html('<span class="text-success">✅ 检测完成</span>');
                },
                error: function (xhr) {
                    try { var err = JSON.parse(xhr.responseText); $('#qualityTip').html('<span class="text-danger">❌ ' + (err.msg || '检测失败') + '</span>'); }
                    catch (e) { $('#qualityTip').html('<span class="text-danger">❌ 检测失败，请确认已上传数据后刷新页面</span>'); }
                }
            });
        });

        function renderQualityReport(report) {
            var totalMiss = report.columns.filter(function (c) { return c.missing_count > 0; }).length;
            var totalOut = report.columns.filter(function (c) { return c.outlier_count > 0; }).length;
            $('#qualitySummary').text('共 ' + report.total_rows + ' 行 × ' + report.total_cols + ' 列 | 缺失值列：' + totalMiss + ' | 异常值列：' + totalOut);

            var rows = '';
            report.columns.forEach(function (col) {
                var missBadge = col.missing_count > 0
                    ? '<span class="badge bg-danger">' + col.missing_count + ' (' + col.missing_pct + '%)</span>'
                    : '<span class="badge bg-success">0</span>';
                var outBadge = col.outlier_count > 0
                    ? '<span class="badge bg-warning text-dark badge-click" onclick="showOutlierRows(\'' + col.name + '\')">' + col.outlier_count + ' (' + col.outlier_pct + '%)</span>'
                    : '<span class="badge bg-success">0</span>';
                if (!col.outlier_method) outBadge = '<span class="badge bg-secondary">—</span>';

                var bounds = col.outlier_bounds && col.outlier_bounds.length === 2
                    ? '[' + col.outlier_bounds[0].toFixed(2) + ', ' + col.outlier_bounds[1].toFixed(2) + ']'
                    : '—';

                rows += '<tr>' +
                    '<td><strong>' + col.name + '</strong></td>' +
                    '<td>' + col.dtype + '</td>' +
                    '<td>' + missBadge + '</td>' +
                    '<td>' + outBadge + '</td>' +
                    '<td>' + bounds + '</td>' +
                    '</tr>';
            });
            $('#qualityTableBody').html(rows);
        }

        // ========== 异常值详情展示 ==========
        function showOutlierRows(colName) {
            if (!qualityReportCache) return;
            var col = qualityReportCache.columns.find(function (c) { return c.name === colName; });
            if (!col || !col.outlier_rows || col.outlier_rows.length === 0) return;

            var boundsStr = col.outlier_bounds && col.outlier_bounds.length === 2
                ? col.outlier_bounds[0].toFixed(2) + ', ' + col.outlier_bounds[1].toFixed(2)
                : '';
            $('#outlierDetailTitle').text('列 [' + colName + '] 异常值详情 (共 ' + col.outlier_rows.length + ' 行, 正常范围 [' + boundsStr + '])');

            var allCols = qualityReportCache.columns.map(function (c) { return c.name; });
            var headHtml = '<tr><th>行号</th>' + allCols.map(function (c) {
                var style = c === colName ? ' style="background:#fff3cd;color:#92400e;"' : '';
                return '<th' + style + '>' + c + '</th>';
            }).join('') + '</tr>';
            $('#outlierDetailHead').html(headHtml);

            var bodyHtml = col.outlier_rows.map(function (row) {
                return '<tr>' +
                    '<td><strong>' + row.index + '</strong></td>' +
                    allCols.map(function (c) {
                        var val = row.values[c];
                        var style = c === colName ? ' style="background:#fff3cd;font-weight:600;"' : '';
                        return '<td' + style + '>' + (val != null ? val : '') + '</td>';
                    }).join('') + '</tr>';
            }).join('');
            $('#outlierDetailBody').html(bodyHtml);
            $('#outlierDetailCard').removeClass('section-hidden');
            document.getElementById('outlierDetailCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ========== 每列清洗策略配置 ==========
        function renderCleanConfig(report) {
            var html = '';
            report.columns.forEach(function (col) {
                var missOpts = '';
                ['ignore', 'fill_mean', 'fill_median', 'fill_mode', 'fill_zero', 'fill_ffill', 'fill_bfill', 'drop'].forEach(function (s) {
                    var labels = { ignore: '不处理', fill_mean: '填均值', fill_median: '填中位数', fill_mode: '填众数', fill_zero: '填0', fill_ffill: '前向填充', fill_bfill: '后向填充', drop: '删行' };
                    var sel = (col.missing_count > 0 && s === 'fill_mean') || (col.missing_count === 0 && s === 'ignore') ? ' selected' : '';
                    missOpts += '<option value="' + s + '"' + sel + '>' + labels[s] + '</option>';
                });

                var outOpts = '';
                if (col.outlier_method) {
                    ['ignore', 'cap', 'remove'].forEach(function (s) {
                        var labels = { ignore: '不处理', cap: '截断替换', remove: '删行' };
                        var sel = s === 'cap' ? ' selected' : '';
                        outOpts += '<option value="' + s + '"' + sel + '>' + labels[s] + '</option>';
                    });
                } else {
                    outOpts = '<option value="ignore" selected>—</option>';
                }

                var badges = '';
                if (col.missing_count > 0) badges += ' <span class="badge bg-danger">缺' + col.missing_count + '</span>';
                if (col.outlier_count > 0) badges += ' <span class="badge bg-warning text-dark">异' + col.outlier_count + '</span>';

                html += '<div class="config-row d-flex align-items-center gap-2 py-1 px-2 border-bottom">' +
                    '<strong style="min-width:140px;">' + col.name + '</strong>' +
                    '<label class="small mb-0">缺失值:</label>' +
                    '<select class="form-select form-select-sm sel-miss" data-col="' + col.name + '" style="width:120px;">' + missOpts + '</select>' +
                    '<label class="small mb-0">异常值:</label>' +
                    '<select class="form-select form-select-sm sel-outlier" data-col="' + col.name + '" style="width:120px;">' + outOpts + '</select>' +
                    badges +
                    '</div>';
            });
            $('#cleanConfigGrid').html(html);
        }

        // ========== 执行自动清洗 ==========
        $('#btnAutoClean').click(function () {
            var missCfg = {};
            var outCfg = { method: 'iqr', iqr_multiplier: 1.5 };

            $('.sel-miss').each(function () { missCfg[$(this).data('col')] = $(this).val(); });
            $('.sel-outlier').each(function () { outCfg[$(this).data('col')] = $(this).val(); });

            var config = { missing_strategy: missCfg, outlier_strategy: outCfg };
            $('#autoCleanTip').html('<span class="text-info">⏳ 清洗中...</span>');

            $.ajax({
                url: '/auto_clean', type: 'POST', contentType: 'application/json',
                data: JSON.stringify(config),
                success: function (res) {
                    if (res.code !== 200) {
                        $('#autoCleanTip').html('<span class="text-warning">⚠ ' + (res.msg || '清洗失败') + '</span>');
                        return;
                    }
                    var details = res.data.report.details ? res.data.report.details.replace(/\n/g, '<br>') : '';
                    $('#autoCleanTip').html('<span class="text-success">✅ ' + res.msg + '</span><br><small class="text-muted">' + details + '</small>');
                    renderPreview(res.data);
                    // 重新检测更新质量报告
                    $('#btnQualityCheck').click();
                },
                error: function (xhr) {
                    try { var err = JSON.parse(xhr.responseText); $('#autoCleanTip').html('<span class="text-warning">⚠ ' + (err.msg || '清洗失败') + '</span>'); }
                    catch (e) { $('#autoCleanTip').html('<span class="text-warning">⚠ 清洗失败，请确认已上传数据后刷新页面</span>'); }
                }
            });
        });

        $('#btnResetConfig').click(function () { $('#btnQualityCheck').click(); });

        // ========== 数据预览 ==========
        function renderPreview(data) {
            var headHtml = '<tr>' + data.columns.map(function (c) { return '<th>' + c + '</th>'; }).join('') + '</tr>';
            var bodyHtml = data.rows.map(function (row) {
                return '<tr>' + row.map(function (v) { return '<td>' + (v != null ? v : '') + '</td>'; }).join('') + '</tr>';
            }).join('');
            $('#previewHead').html(headHtml);
            $('#previewBody').html(bodyHtml);
            $('#previewCard').removeClass('section-hidden');
        }
    </script>
</body>

</html>
