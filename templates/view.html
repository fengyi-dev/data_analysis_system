<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 18px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f3f5f7;
        }

        .page {
            max-width: 980px;
            margin: auto;
            padding: 22px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.08);
        }

        .controls {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(4, minmax(180px, 1fr));
            margin-bottom: 18px;
        }

        .controls label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-size: 0.92rem;
        }

        select,
        button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 0.95rem;
        }

        button {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #chart {
            height: 460px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .message {
            margin-top: 14px;
            color: #dc2626;
        }

        @media (max-width: 760px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <h2>数据可视化</h2>
        <div class="controls">
            <div>
                <label>图表类型</label>
                <select id="chartType">
                    <option value="bar">柱状图</option>
                    <option value="line">折线图</option>
                    <option value="scatter">散点图</option>
                    <option value="heatmap">热力图</option>
                </select>
            </div>
            <div>
                <label>X 轴字段</label>
                <select id="xAxis"></select>
            </div>
            <div>
                <label>Y 轴字段</label>
                <select id="yAxis"></select>
            </div>
            <div id="valueColGroup">
                <label>热力图值字段</label>
                <select id="valueCol"></select>
            </div>
        </div>

        <button id="drawBtn">绘制图表</button>
        <div id="chart"></div>
        <div id="viewMessages" class="message"></div>
    </div>

    <script>
        var chart = echarts.init(document.getElementById('chart'));

        function showMessage(text) {
            $('#viewMessages').text(text);
        }

        function updateHeatmapField() {
            $('#valueColGroup').toggle($('#chartType').val() === 'heatmap');
        }

        function buildPayload() {
            var chartType = $('#chartType').val();
            return {
                x_col: $('#xAxis').val(),
                y_col: $('#yAxis').val(),
                chart_type: chartType,
                value_col: chartType === 'heatmap' ? $('#valueCol').val() : null
            };
        }

        function detectAxisType(values) {
            if (!values.length) return 'category';
            var isDate = values.every(function (value) {
                return value != null && value !== '' && !isNaN(new Date(value).getTime());
            });
            if (isDate) return 'time';
            var isNumeric = values.every(function (value) {
                return value != null && value !== '' && !isNaN(Number(value));
            });
            return isNumeric ? 'value' : 'category';
        }

        function renderHeatmap(data) {
            chart.setOption({
                title: { text: '热力图', left: 'center' },
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        return data.x_labels[params.value[0]] + ' × ' + data.y_labels[params.value[1]] + '<br>' + data.value_label + ': ' + params.value[2];
                    }
                },
                xAxis: { type: 'category', data: data.x_labels, axisLabel: { rotate: 30 } },
                yAxis: { type: 'category', data: data.y_labels, inverse: true },
                visualMap: { min: data.min_value, max: data.max_value, bottom: 10, inRange: { color: ['#e0f3ff', '#1890ff', '#0f172a'] } },
                series: [{ type: 'heatmap', data: data.heatmap_data, animation: false }]
            });
        }

        function renderSimpleChart(data, chartType) {
            var xValues = data.x_values || [];
            var yValues = data.y_values || [];
            var axisType = detectAxisType(xValues);
            var seriesData = axisType === 'category' ? yValues : xValues.map(function (x, i) { return [x, yValues[i]]; });
            chart.setOption({
                title: { text: $('#chartType option:selected').text(), left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { type: axisType, data: axisType === 'category' ? xValues : undefined },
                yAxis: { type: 'value' },
                series: [{ type: chartType, data: seriesData }]
            });
        }

        function loadOptions() {
            var columns = JSON.parse(localStorage.getItem('cols') || '[]');
            var options = columns.map(function (col) { return '<option>' + col + '</option>'; }).join('');
            $('#xAxis, #yAxis, #valueCol').html(options);
            if (columns.length) {
                $('#xAxis').val(columns[0]);
                $('#yAxis').val(columns[1] || columns[0]);
                $('#valueCol').val(columns[0]);
            } else {
                showMessage('请先上传数据并选择字段。');
            }
            updateHeatmapField();
        }

        function fetchAndRender() {
            var payload = buildPayload();
            if (!payload.x_col || !payload.y_col) {
                showMessage('请选择 X/Y 字段。');
                return;
            }
            $.ajax({
                url: '/get_data',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (result) {
                    if (result.code !== 200) {
                        showMessage(result.msg || '请求失败');
                        return;
                    }
                    if (payload.chart_type === 'heatmap') {
                        renderHeatmap(result.data);
                    } else {
                        renderSimpleChart(result.data, payload.chart_type);
                    }
                    showMessage('图表已生成。');
                },
                error: function () {
                    showMessage('请求失败，请重试。');
                }
            });
        }

        $('#chartType').on('change', updateHeatmapField);
        $('#drawBtn').on('click', fetchAndRender);
        $(window).on('resize', function () { chart.resize(); });
        loadOptions();
    </script>
</body>

</html>
