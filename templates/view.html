<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f8f9fa;
            padding: 24px;
        }

        .page {
            max-width: 960px;
            margin: auto;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .06);
        }

        #chart {
            height: 460px;
            border: 1px solid #e9ecef;
            border-radius: 10px;
        }

        .form-row {
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="page">
        <h3 class="mb-4">数据可视化</h3>
        <div class="row g-3 form-row">
            <div class="col-md-3">
                <label class="form-label">图表类型</label>
                <select id="chartType" class="form-select">
                    <option value="bar">柱状图</option>
                    <option value="line">折线图</option>
                    <option value="scatter">散点图</option>
                    <option value="heatmap">热力图</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">X 轴字段</label>
                <select id="xAxis" class="form-select"></select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Y 轴字段</label>
                <select id="yAxis" class="form-select"></select>
            </div>
            <div class="col-md-3" id="valueColGroup">
                <label class="form-label">热力图值字段</label>
                <select id="valueCol" class="form-select"></select>
            </div>
        </div>

        <button id="drawBtn" class="btn btn-primary mb-4">绘制图表</button>

        <div id="chart"></div>
        <div id="viewMessages" class="mt-3"></div>
    </div>

    <script>
        var chart = echarts.init(document.getElementById('chart'));

        function showMessage(text, type) {
            $('#viewMessages').html('<div class="alert alert-' + type + ' mt-3 py-2 small">' + text + '</div>');
        }

        function updateValueColVisibility() {
            $('#valueColGroup').toggle($('#chartType').val() === 'heatmap');
        }

        function buildPayload() {
            var chartType = $('#chartType').val();
            return {
                x_col: $('#xAxis').val(),
                y_col: $('#yAxis').val(),
                chart_type: chartType,
                value_col: chartType === 'heatmap' ? $('#valueCol').val() : null
            };
        }

        function isNumericArray(arr) {
            return arr.length && arr.every(function (v) {
                return v !== null && v !== '' && !isNaN(Number(v));
            });
        }

        function isDateArray(arr) {
            return arr.length && arr.every(function (v) {
                return v != null && v !== '' && !isNaN(new Date(v).getTime());
            });
        }

        function renderHeatmap(data) {
            chart.setOption({
                title: { text: '热力图', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        return data.x_labels[params.value[0]] + ' × ' + data.y_labels[params.value[1]] + '<br/>' + data.value_label + ': ' + params.value[2];
                    }
                },
                grid: { left: 80, right: 30, top: 80, bottom: 80 },
                xAxis: { type: 'category', data: data.x_labels, axisLabel: { rotate: 30 } },
                yAxis: { type: 'category', data: data.y_labels, inverse: true },
                visualMap: {
                    min: data.min_value,
                    max: data.max_value,
                    orient: 'horizontal',
                    left: 'center',
                    bottom: 10,
                    inRange: { color: ['#e0f3ff', '#1890ff', '#004c99'] }
                },
                series: [{
                    type: 'heatmap',
                    data: data.heatmap_data,
                    emphasis: { itemStyle: { borderColor: '#333', borderWidth: 1 } },
                    animation: false
                }]
            });
        }

        function renderXYChart(data, chartType) {
            var xValues = data.x_values || [];
            var yValues = data.y_values || [];
            var xType = 'category';
            if (isDateArray(xValues)) {
                xType = 'time';
            } else if (isNumericArray(xValues)) {
                xType = 'value';
            }

            var seriesData = xType === 'category'
                ? yValues
                : xValues.map(function (x, i) { return [x, yValues[i]]; });

            chart.setOption({
                title: { text: $('#chartType option:selected').text(), left: 'center', textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis' },
                xAxis: { type: xType, data: xType === 'category' ? xValues : undefined },
                yAxis: { type: 'value' },
                series: [{ type: chartType, data: seriesData }]
            });
        }

        function handleResponse(result, chartType) {
            if (result.code !== 200) {
                showMessage('⚠ ' + (result.msg || '获取失败'), 'warning');
                return;
            }

            if (chartType === 'heatmap') {
                renderHeatmap(result.data);
            } else {
                renderXYChart(result.data, chartType);
            }

            showMessage('图表已生成。', 'success');
        }

        function fetchAndRender() {
            var payload = buildPayload();
            if (!payload.x_col || !payload.y_col) {
                showMessage('请选择 X/Y 字段后再绘制图表。', 'warning');
                return;
            }

            $.ajax({
                url: '/get_data',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (result) {
                    handleResponse(result, payload.chart_type);
                },
                error: function (xhr) {
                    try {
                        var err = JSON.parse(xhr.responseText);
                        showMessage('⚠ ' + (err.msg || '请求失败'), 'warning');
                    } catch (e) {
                        showMessage('⚠ 请求失败，请稍后重试。', 'warning');
                    }
                }
            });
        }

        function initializeOptions() {
            var columns = JSON.parse(localStorage.getItem('cols') || '[]');
            var options = columns.map(function (col) {
                return '<option value="' + col + '">' + col + '</option>';
            }).join('');

            $('#xAxis, #yAxis, #valueCol').html(options);
            if (columns.length) {
                $('#xAxis').val(columns[0]);
                $('#yAxis').val(columns[1] || columns[0]);
                $('#valueCol').val(columns[0]);
            }
            updateValueColVisibility();
        }

        $('#chartType').on('change', updateValueColVisibility);
        $('#drawBtn').on('click', fetchAndRender);

        window.addEventListener('resize', function () {
            chart.resize();
        });

        initializeOptions();
        if ($('#xAxis').val() && $('#yAxis').val()) {
            setTimeout(fetchAndRender, 200);
        }
    </script>
</body>

</html>
