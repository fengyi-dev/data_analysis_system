<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据可视化模块</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        .chart-container {
            height: 400px;
            width: 100%;
        }
    </style>
</head>

<body class="container mt-4">
    <h3>可视化｜自定义参数：柱状/折线/散点图</h3>
    <div class="row my-3">
        <div class="col-md-3">
            <label>图表类型</label>
            <select id="chartType" class="form-select">
                <option value="bar">柱状图</option>
                <option value="line">折线图</option>
                <option value="scatter">散点图</option>
            </select>
        </div>
        <div class="col-md-3">
            <label>X轴字段</label>
            <select id="xAxis" class="form-select"></select>
        </div>
        <div class="col-md-3">
            <label>Y轴字段</label>
            <select id="yAxis" class="form-select"></select>
        </div>
        <div class="col-md-3 mt-4">
            <button id="drawBtn" class="btn btn-success">绘制图表</button>
        </div>
    </div>
    <div id="chart" class="chart-container border"></div>

    <script>
        //初始化画布
        var chart = echarts.init(document.getElementById('chart'));
        //绘图按钮
        $('#drawBtn').click(function () {
            var x = $('#xAxis').val(), y = $('#yAxis').val();
            if (!x || !y) { alert('请选择字段'); return; }
            $.ajax({
                url: '/get_data',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ x_col: x, y_col: y }),
                success: function (res) {
                    let option = {
                        title: { text: x + " vs " + y },
                        xAxis: { type: 'category', data: res.data.x_values },
                        yAxis: { type: 'value' },
                        series: [{ type: $('#chartType').val(), data: res.data.y_values }]
                    }
                    chart.setOption(option);
                }
            })
        });
        //切换图表自动重绘
        $('#chartType').change(() => {
            if ($('#xAxis').val()) $('#drawBtn').click();
        })
        //窗口自适应
        window.addEventListener('resize', () => chart.resize())
        //页面加载回填下拉列名
        let cols = JSON.parse(localStorage.getItem('cols') || '[]');
        cols.forEach(item => {
            $('#xAxis').append(`<option value="${item}">${item}</option>`);
            $('#yAxis').append(`<option value="${item}">${item}</option>`);
        })
    </script>
</body>

</html>
