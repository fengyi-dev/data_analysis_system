<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
    <style>
        .chart-container {
            height: 400px;
            width: 100%;
        }

        .preview-table {
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">数据分析系统</h1>

        <!-- 文件上传 -->
        <div class="card mb-4">
            <div class="card-header">文件上传</div>
            <div class="card-body">
                <input type="file" class="form-control" id="fileInput" accept=".csv,.xlsx,.xls">
                <button class="btn btn-primary mt-2" id="uploadBtn">上传文件</button>
                <div id="uploadStatus"></div>
            </div>
        </div>

        <!-- 数据预览 -->
        <div class="card mb-4">
            <div class="card-header">数据预览</div>
            <div class="card-body preview-table" id="dataPreview">请先上传数据</div>
        </div>

        <!-- 图表配置 -->
        <div class="card mb-4">
            <div class="card-header">图表配置</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label>图表类型:</label>
                        <select class="form-select" id="chartType">
                            <option value="bar">柱状图</option>
                            <option value="line">折线图</option>
                            <option value="scatter">散点图</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>X轴:</label>
                        <select class="form-select" id="xAxis" disabled></select>
                    </div>
                    <div class="col-md-3">
                        <label>Y轴:</label>
                        <select class="form-select" id="yAxis" disabled></select>
                    </div>
                    <div class="col-md-3 align-self-end">
                        <button class="btn btn-success w-100" id="drawBtn" disabled>绘制图表</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表展示 -->
        <div class="card mb-4">
            <div class="card-header">图表展示</div>
            <div class="card-body">
                <div id="chart" class="chart-container"></div>
            </div>
        </div>

        <!-- 分析结果 -->
        <div class="card mb-4">
            <div class="card-header">线性回归分析</div>
            <div class="card-body" id="analysisResult">请上传数据进行分析</div>
        </div>

        <!-- 导出按钮 -->
        <div class="text-center"><a href="/export" class="btn btn-info" id="exportBtn" disabled>导出数据</a></div>
    </div>

    <script>
        var chart = echarts.init(document.getElementById('chart'));

        // 文件上传
        $('#uploadBtn').click(function () {
            var file = $('#fileInput')[0].files[0];
            if (!file) { $('#uploadStatus').html('<span class="text-danger">请选择文件</span>'); return; }

            var formData = new FormData();
            formData.append('file', file);

            $.ajax({
                url: '/upload', type: 'POST', data: formData,
                processData: false, contentType: false,
                success: function (res) {
                    if (res.code === 200) {
                        $('#uploadStatus').html('<span class="text-success">上传成功</span>');
                        renderPreview(res.data);
                        populateSelects(res.data.columns);
                        $('#xAxis, #yAxis, #drawBtn, #exportBtn').prop('disabled', false);
                    } else {
                        $('#uploadStatus').html('<span class="text-danger">' + res.msg + '</span>');
                    }
                }
            });
        });

        // 渲染预览表格
        function renderPreview(data) {
            var html = '<table class="table table-striped"><thead><tr>';
            data.columns.forEach(col => html += '<th>' + col + '</th>');
            html += '</tr></thead><tbody>';
            data.rows.forEach(row => {
                html += '<tr>';
                row.forEach(cell => html += '<td>' + (cell || '') + '</td>');
                html += '</tr>';
            });
            html += '</tbody></table>';
            $('#dataPreview').html(html);
        }

        // 填充下拉菜单
        function populateSelects(cols) {
            var opts = '<option value="">请选择</option>';
            cols.forEach(col => opts += '<option value="' + col + '">' + col + '</option>');
            $('#xAxis, #yAxis').html(opts);
        }

        // 绘制图表
        $('#drawBtn').click(function () {
            var x = $('#xAxis').val(), y = $('#yAxis').val();
            if (!x || !y) { alert('请选择字段'); return; }

            // 获取图表数据
            $.ajax({
                url: '/get_data', type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ x_col: x, y_col: y }),
                success: function (res) {
                    var option = {
                        title: { text: x + ' vs ' + y },
                        tooltip: { trigger: 'axis' },
                        xAxis: { type: 'category', data: res.data.x_values },
                        yAxis: { type: 'value' },
                        series: [{ type: $('#chartType').val(), data: res.data.y_values }]
                    };
                    chart.setOption(option);
                }
            });

            // 获取分析结果
            $.ajax({
                url: '/analyze', type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ x_col: x, y_col: y }),
                success: function (res) {
                    var html = '<div class="row"><div class="col-md-4"><div class="card bg-light text-center"><p>R²分数</p><p class="h3">' + res.data.r2_score + '</p></div></div>';
                    html += '<div class="col-md-4"><div class="card bg-light text-center"><p>斜率</p><p class="h3">' + res.data.slope + '</p></div></div>';
                    html += '<div class="col-md-4"><div class="card bg-light text-center"><p>截距</p><p class="h3">' + res.data.intercept + '</p></div></div></div>';
                    $('#analysisResult').html(html);
                }
            });
        });

        // 图表类型切换
        $('#chartType').change(function () { if ($('#xAxis').val()) $('#drawBtn').click(); });
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>

</html>
